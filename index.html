<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Quiz ICS3U</title>
</head>

<body>

  <!-- Titre principal du quiz -->
  <h2>Quiz ICS3U</h2>

  <!-- Question 1 : cases à cocher -->
  <label>Question 1 : Quelle est la bonne réponse?</label>
  <br>

  <input type="checkbox" id="q1_option1" name="option" value="oui">
  <label for="q1_option1">Oui</label>
  <br>

  <input type="checkbox" id="q1_option2" name="option" value="non">
  <label for="q1_option2">Non</label>
  <br>

  <input type="checkbox" id="q1_option3" name="option" value="peut-être">
  <label for="q1_option3">Peut-être</label>

  <h3 hidden id="réponse1">Réponse :</h3>

  <br><br>
  
  <!-- Question 2 : boutons radio -->
  <label>Question 2 : Pourquoi es-tu ici?</label>
  <br>

  <input type="radio" id="q2_option1" name="option2" value="pour-jouer">
  <label for="q2_option1">Pour jouer</label>
  <br>

  <input type="radio" id="q2_option2" name="option2" value="pour-apprendre">
  <label for="q2_option2">Pour apprendre</label>
  <br>

  <input type="radio" id="q2_option3" name="option2" value="je-ne-sais-pas">
  <label for="q2_option3">Je ne sais pas</label>

  <h3 hidden id="réponse2">Réponse :</h3>

  <br><br>
  
  <!-- Question 3 : champ de texte -->
  <label for="option3">Question 3 : Écris le nom du pays correct.</label>
  <br>

  <input type="text" id="option3" name="option3" value="bonne chance!"> 

  <h3 hidden id="réponse3">Réponse :</h3>

  <br><br>

  <!-- Question 4 : liste déroulante avec groupes d’options -->
  <label for="q4_select">Question 4 : Choisis le bon pays.</label>
  <br>

  <select id="q4_select" name="option4">
    <option value="">-- Choisis une réponse --</option>

    <optgroup label="Afrique">
      <option value="nigéria">Nigéria</option>
      <option value="égypte">Égypte</option>
      <option value="kenya">Kenya</option>
    </optgroup>

    <optgroup label="Asie">
      <option value="japon">Japon</option>
      <option value="chine">Chine</option>
      <option value="inde">Inde</option>
    </optgroup>

    <optgroup label="Amérique">
      <option value="canada">Canada</option>
      <option value="brésil">Brésil</option>
      <option value="mexique">Mexique</option>
    </optgroup>
  </select>

  <h3 hidden id="réponse4">Réponse :</h3>

  <br><br>

  <!-- Question 5 : curseur -->
  <label for="q5_range">Question 5 : Choisis le nombre chanceux.</label>
  <br>

  <input type="range" id="q5_range" name="option5" min="1" max="10" value="5" oninput="afficherValeurRange()">

  <p>Nombre choisi : <span id="range_value">5</span></p>

  <h3 hidden id="réponse5">Réponse :</h3>

  <br><br>

  <!-- Question 6 : choix d'une date -->
  <label for="q6_date">Question 6 : Choisis la bonne date.</label>
  <br>

  <input type="date" id="q6_date" name="option6">

  <h3 hidden id="réponse6">Réponse :</h3>

  <br><br>
  
  <!-- Résultat final -->
  <h3 hidden id="résultat">Résultat :</h3>

  <!-- Bouton pour soumettre les réponses -->
  <button onclick="soumettre()">Soumettre les réponses</button>

  <script>

    // Réponses possibles pour la question 4
    var randomAnswers = [
      "nigéria", "égypte", "kenya",
      "japon", "chine", "inde",
      "canada", "brésil", "mexique"
    ];

    // Choisit une réponse au hasard pour la question 4
    var randomIndex = Math.floor(Math.random() * randomAnswers.length);
    var randomCorrectAnswer = randomAnswers[randomIndex];

    // Fonction pour afficher la valeur du curseur
    function afficherValeurRange() {
      var range = document.getElementById("q5_range");
      var rangeValue = document.getElementById("range_value");

      rangeValue.innerHTML = range.value;
    }

    // Fonction appelée quand l'utilisateur clique sur le bouton
    function soumettre() {
        
      // Tableau avec les bonnes réponses
      var réponseauxquestion = [
        "non", 
        "pour-apprendre", 
        "nigéria", 
        randomCorrectAnswer,
        "7",
        "2026-05-01"
      ];
  
      // Récupère les réponses de l'utilisateur
      var questionanswered1 = document.getElementsByName("option");
      var questionanswered2 = document.getElementsByName("option2");
      var questionanswered3 = document.getElementsByName("option3");
      var questionanswered4 = document.getElementById("q4_select");
      var questionanswered5 = document.getElementById("q5_range");
      var questionanswered6 = document.getElementById("q6_date");
    
      var correct = 0;
      var totalquestion = réponseauxquestion.length;
        
      var showanswer1 = document.getElementById("réponse1");
      var showanswer2 = document.getElementById("réponse2");
      var showanswer3 = document.getElementById("réponse3");
      var showanswer4 = document.getElementById("réponse4");
      var showanswer5 = document.getElementById("réponse5");
      var showanswer6 = document.getElementById("réponse6");

      var resultat = document.getElementById("résultat");
        
      // Vérification de la question 1
      for (let i = 0; i < questionanswered1.length; i++) {
        let optionselected = questionanswered1[i];
            
        if (optionselected.checked && optionselected.value == réponseauxquestion[0]) {
          correct += 1;
        }
      }

      showanswer1.innerHTML = "Réponse : " + réponseauxquestion[0];
      showanswer1.hidden = false;
        
      // Vérification de la question 2
      for (let i = 0; i < questionanswered2.length; i++) {
        let optionselected = questionanswered2[i];
            
        if (optionselected.checked && optionselected.value == réponseauxquestion[1]) {
          correct += 1;
        }
      }

      showanswer2.innerHTML = "Réponse : " + réponseauxquestion[1];
      showanswer2.hidden = false;
        
      // Vérification de la question 3
      for (let i = 0; i < questionanswered3.length; i++) {
        let optionselected = questionanswered3[i];
            
        if (optionselected.value.toLowerCase() == réponseauxquestion[2]) {
          correct += 1;
        }
      }

      showanswer3.innerHTML = "Réponse : " + réponseauxquestion[2];
      showanswer3.hidden = false;

      // Vérification de la question 4
      if (questionanswered4.value == réponseauxquestion[3]) {
        correct += 1;
      }

      showanswer4.innerHTML = "Réponse : " + réponseauxquestion[3];
      showanswer4.hidden = false;

      // Vérification de la question 5
      if (questionanswered5.value == réponseauxquestion[4]) {
        correct += 1;
      }

      showanswer5.innerHTML = "Réponse : " + réponseauxquestion[4];
      showanswer5.hidden = false;

      // Vérification de la question 6
      if (questionanswered6.value == réponseauxquestion[5]) {
        correct += 1;
      }

      showanswer6.innerHTML = "Réponse : " + réponseauxquestion[5];
      showanswer6.hidden = false;
        
      // Affiche le résultat final
      resultat.hidden = false;
      resultat.innerHTML = "Résultat : " + (correct / totalquestion * 100) + "%";
    }
    
  </script>

</body>
</html>
